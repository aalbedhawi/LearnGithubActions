name: CI
on:
  push:
    branches: [ "main" ]

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: run the tests for the calculator app
        run: python calc_unit_test.py
      - name: send alert on failure to discord channel
        uses: tsickert/discord-webhook@v7.0.0
        if: failure()  
        with:
          content: "Build Failed, please fix pipeline"
          webhook-url: ${{ secrets.DISCORD_WEBHOOK }}
